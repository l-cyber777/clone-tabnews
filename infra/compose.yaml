# Defines the services that Docker will start
# Define os serviços que o Docker vai subir
services:
  # Database service
  # Serviço do banco de dados
  database:
    # Official PostgreSQL version 16 image
    # Imagem oficial do PostgreSQL versão 16
    image: "postgres:16.0-alpine3.18"

    # Loads the environment variables from the .env.development file
    # Carrega as variáveis de ambiente do arquivo .env.development
    env_file:
      - ../.env.development

    # Maps the container port to the local machine
    # Mapeia a porta do container para a máquina local
    ports:
      - "5432:5432"
